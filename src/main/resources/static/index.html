<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webforum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<header class="header">
    <h1>Webforum</h1>
    <nav>
        <a href="#">Start</a>
        <a href="#">Login</a>
        <a href="#">Registrieren</a>
    </nav>
</header>

<main class="container">
    <section class="intro">
        <h2>Willkommen im Webforum</h2>
        <p>Hier können Nutzer Themen lesen, erstellen und Beiträge verfassen.</p>
    </section>

    <section class="actions">
        <button type="button" id="loadTopicsButton">Themen laden</button>
        <button type="button" id="createTopicButton">Neues Thema</button>
    </section>

    <section class="topic-form hidden" id="topicForm">
        <h2>Neues Thema erstellen</h2>

        <form>
            <label for="topicTitle">Titel des Themas</label>
            <input type="text" id="topicTitle" placeholder="Titel des Themas">

            <label for="topicContent">Beschreibung</label>
            <textarea id="topicContent" placeholder="Beschreibung"></textarea>

            <button type="button" id="saveTopicButton">Speichern</button>
        </form>
    </section>

    <section class="topics">
        <h2>Forum-Übersicht</h2>
        <div id="topicList">
            <p>Noch keine Themen geladen.</p>
        </div>
    </section>
</main>

<footer class="footer">
    <p>2026 Webforum MVP</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="js/app.js"></script>
</body>
</html>
